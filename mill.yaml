esphome:
  name: mill
  friendly_name: mill

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "xxx"

ota:
  - platform: esphome
    password: "xxx"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mill Fallback Hotspot"
    password: "xxx"

# I2C
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a


web_server:
  port: 80

captive_portal:
    
#The button
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: 
        input: true
        pullup: true
      inverted: True
    name: "Button"
    on_press:
      - switch.toggle: relay


#LED and relay
switch:
#  - platform: gpio
#    pin: GPIO18
#    name: "Green LED"
#  - platform: gpio
#    pin: GPIO19
#    name: "Red LED"
  - platform: gpio
    pin: GPIO25
    name: "Relay"
    id: "relay"
    inverted: false
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - light.turn_on: switch_led
    on_turn_off:
      then:
        - light.turn_off: switch_led


#Status LED
light:
  - platform: status_led
    id: "switch_led"
    name: "Switch led"
    pin: GPIO19
    internal: true

#UART1 GPIO17 och GPIO18
uart:
  - id: UART1
    rx_pin: GPIO18
    tx_pin: GPIO17
    baud_rate: 9600
    parity: ODD
    stop_bits: 1
    debug:
      direction: rx
      dummy_receiver: true
      after:
        timeout: 10ms

